<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RbxAI</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d14;
    --surface: #13131f;
    --surface2: #1a1a2e;
    --border: #2a2a45;
    --accent: #00b4ff;
    --accent2: #ff4d6d;
    --green: #00ff9f;
    --yellow: #ffd700;
    --text: #dde4ff;
    --muted: #4a4a7a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(0,180,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255,77,109,0.04) 0%, transparent 60%);
  }

  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    flex-shrink: 0;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    opacity: 0.6;
  }

  .avatar {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #7b2fff);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(0,180,255,0.3);
    animation: glowPulse 3s infinite;
  }

  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 16px rgba(0,180,255,0.3); }
    50% { box-shadow: 0 0 24px rgba(0,180,255,0.6); }
  }

  .header-info h1 {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 2px;
    line-height: 1;
  }

  .rbx { color: var(--accent); }
  .ai-txt { color: var(--accent2); }

  .header-info .sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .online-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 1px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
  }

  .online-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green);
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .welcome {
    margin: auto;
    text-align: center;
    padding: 24px 20px;
  }

  .welcome-icon { font-size: 52px; margin-bottom: 14px; display: block; }

  .welcome h2 {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 1px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .welcome p {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.9;
    max-width: 360px;
    margin: 0 auto 20px;
  }

  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 520px;
    margin: 0 auto;
  }

  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 7px 13px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,180,255,0.08);
    transform: translateY(-1px);
  }

  .message {
    display: flex;
    gap: 10px;
    animation: slideIn 0.25s ease;
    max-width: 840px;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.ai { align-self: flex-start; }

  .msg-av {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .message.user .msg-av { background: linear-gradient(135deg, #3a3a6a, #5a3a8a); }
  .message.ai .msg-av { background: linear-gradient(135deg, var(--accent), #7b2fff); }

  .msg-body { display: flex; flex-direction: column; gap: 4px; max-width: 600px; }
  .message.user .msg-body { align-items: flex-end; }

  .msg-name {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  .message.user .msg-name { color: #7b5abf; }
  .message.ai .msg-name { color: var(--accent); }

  .bubble {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .bubble {
    background: var(--surface2);
    border: 1px solid #3a2a6a;
    border-top-right-radius: 2px;
  }

  .message.ai .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 2px;
    border-left: 2px solid var(--accent);
  }

  .typing-bubble {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 18px 16px;
  }

  .t-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    animation: tdot 1s infinite;
  }

  .t-dot:nth-child(1) { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .t-dot:nth-child(2) { background: #7b2fff; box-shadow: 0 0 6px #7b2fff; animation-delay: 0.15s; }
  .t-dot:nth-child(3) { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation-delay: 0.3s; }

  @keyframes tdot {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-6px); opacity: 1; }
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    background: var(--surface);
    flex-shrink: 0;
    position: relative;
  }

  footer::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    opacity: 0.4;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 11px 15px;
    resize: none;
    border-radius: 8px;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    min-height: 44px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,180,255,0.12);
  }

  textarea::placeholder { color: var(--muted); }

  #send {
    background: linear-gradient(135deg, var(--accent), #0080cc);
    color: #000;
    border: none;
    padding: 11px 20px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.15s;
    flex-shrink: 0;
    height: 44px;
  }

  #send:hover {
    box-shadow: 0 0 18px rgba(0,180,255,0.45);
    transform: translateY(-1px);
  }

  #send:active { transform: scale(0.97); }
  #send:disabled { background: var(--muted); cursor: not-allowed; box-shadow: none; transform: none; color: #333; }

  .footer-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
  }

  .footer-hint span { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="avatar">🎮</div>
  <div class="header-info">
    <h1><span class="rbx">Rbx</span><span class="ai-txt">AI</span></h1>
    <div class="sub">Roblox expert · no cap · fr fr</div>
  </div>
  <div class="online-badge">
    <div class="online-dot"></div>
    ONLINE
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <span class="welcome-icon">🎮</span>
    <h2>Szévasz haver!</h2>
    <p>RbxAI vagyok. Roblox és Studio témában vagyok W,<br>de seggnyalás nem lesz. Ha hülyeséget kérdezel,<br>megmondom. No cap.</p>
    <div class="quick-btns">
      <button class="quick-btn" onclick="quickAsk('Hogyan scripteljek Roblox Studioban kezdőként?')">🖥️ Scripting alapok</button>
      <button class="quick-btn" onclick="quickAsk('Mi az a RemoteEvent és mikor kell használni?')">📡 RemoteEvent</button>
      <button class="quick-btn" onclick="quickAsk('Miért laggol a játékom és hogyan fixeljük?')">⚡ Lag fix</button>
      <button class="quick-btn" onclick="quickAsk('Hogyan lehet Robuxot keresni legitimen?')">💸 Robux keresés</button>
      <button class="quick-btn" onclick="quickAsk('Mi a különbség LocalScript és Script között?')">📜 Script típusok</button>
      <button class="quick-btn" onclick="quickAsk('Hogyan kell DataStore-t használni mentéshez?')">💾 DataStore</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" placeholder="Kérdezz valamit bro..." rows="1"></textarea>
    <button id="send">Küld 🚀</button>
  </div>
  <div class="footer-hint">
    <span>Enter</span> = küld &nbsp;·&nbsp; <span>Shift+Enter</span> = új sor
  </div>
</footer>

<script>
const SYSTEM = `Te egy Roblox és Roblox Studio szakértő AI vagy, aki magyarul kommunikál, de modern gamer/internet szlenget használ.

SZEMÉLYISÉG:
- Laza, vagány srác stílus — mintha egy tapasztalt Roblox játékos lennél
- NEM nyalsz seggét senkinek, nem mondasz felesleges dicséretet
- Ha valaki hülyeséget ír → megmondod egyenesen de elmagyarázod miért
- Ha nem tudsz valamit → "lövésem sincs bro" vagy "ezt nem tudom ngl"
- Szlengek amiket használsz: bro, haver, fr, no cap, ngl, ofc, W, L, mid, based, cringe, lowkey, highkey, bussin, bet, bruh, gg, poggers, sigma, rizz, gyatt, skibidi, slay, goated, cap, sus, sheesh, ratio, slay
- Ha valaki jól csinál valamit: "W move", "based", "goated", "poggers"  
- Ha valaki rosszul csinálja: "bro ez L", "cringe", "bruh miért", "ratio"
- Tömör válaszok — nem írsz regényt ha nem kell
- Néha sarkasztikus, de nem gonosz
- Mindig magyarul, de szlengek angolul maradhatnak

ROBLOX TUDÁS:
- Luau scripting (a Roblox programozási nyelve — nem Python, nem JS!)
- LocalScript (kliens oldal), Script (szerver oldal), ModuleScript (megosztott kód)
- RemoteEvent (szerver↔kliens kommunikáció, tűz és felejtsd), RemoteFunction (válasz kell)
- BindableEvent (szerver↔szerver vagy kliens↔kliens)
- TweenService (animációk, mozgás)
- Humanoid, HumanoidRootPart, CharacterAdded
- Players service, game.Players.LocalPlayer
- DataStoreService — adatok mentése/töltése
- GUI: ScreenGui, Frame, TextLabel, TextButton, ImageLabel
- CollisionGroup, PhysicsService
- Workspace, ReplicatedStorage, ServerStorage, StarterGui, StarterPack
- Roblox gazdaság: Robux, DevEx (fejlesztői kifizetés), UGC itemek, limitedek, trading
- Népszerű játékok: Adopt Me, Blox Fruits, Pet Simulator X/99, Arsenal, Brookhaven, Murder Mystery 2, Doors, Rainbow Friends, Jailbreak, Piggy
- Roblox avatar customization, katalógus, bundle-ok
- Exploiterek, scripters elleni védelem (szerver oldali ellenőrzés)
- Studio tippek: shortcuts, plugin-ok (Moon Animator, rbxts, Rojo)
- Roblox events, szezonális dolgok

KÓD SZABÁLYOK:
- Ha kódot adsz, az MINDIG Luau legyen (nem Python, nem JavaScript!)
- A kód legyen működő és helyes
- Ha nem biztos vagy valamiben, mondd meg
- Ne találj ki API-kat amik nem léteznek Robloxban

Mindig magyarul válaszolj, szlengek lehetnek angolok.`;

  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  let history = [];
  let loading = false;

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);

  function quickAsk(text) {
    input.value = text;
    send();
  }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function addMsg(role, text, isTyping = false) {
    hideWelcome();

    const wrap = document.createElement('div');
    wrap.className = `message ${isTyping ? 'ai' : role}`;
    if (isTyping) wrap.id = 'typing-msg';

    const av = document.createElement('div');
    av.className = 'msg-av';
    av.textContent = role === 'user' ? '👤' : '🤖';

    const body = document.createElement('div');
    body.className = 'msg-body';

    const name = document.createElement('div');
    name.className = 'msg-name';
    name.textContent = role === 'user' ? 'Te' : 'RbxAI';

    const bubble = document.createElement('div');

    if (isTyping) {
      bubble.className = 'bubble typing-bubble';
      for (let i = 0; i < 3; i++) {
        const d = document.createElement('div');
        d.className = 't-dot';
        bubble.appendChild(d);
      }
    } else {
      bubble.className = 'bubble';
      bubble.textContent = text;
    }

    body.appendChild(name);
    body.appendChild(bubble);
    wrap.appendChild(av);
    wrap.appendChild(body);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text || loading) return;

    loading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    addMsg('ai', '', true);

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM,
          messages: history
        })
      });

      const data = await res.json();
      const typingEl = document.getElementById('typing-msg');
      if (typingEl) typingEl.remove();

      if (data.error) {
        addMsg('ai', '⚠ API hiba bro: ' + data.error.message);
      } else {
        const reply = data.content.map(b => b.text || '').join('');
        history.push({ role: 'assistant', content: reply });
        addMsg('ai', reply);
      }
    } catch (err) {
      const typingEl = document.getElementById('typing-msg');
      if (typingEl) typingEl.remove();
      addMsg('ai', '⚠ Hálózati hiba bro, próbáld újra');
    }

    loading = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
